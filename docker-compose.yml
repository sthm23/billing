version: "3.8"

services:
  postgres:
    image: postgres:18-alpine
    restart: always
    environment:
      - POSTGRES_DB=${POSTGRES_DB}
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
    ports:
      - ${POSTGRES_OUTPUT_PORT}:${POSTGRES_PORT}
    volumes:
      - datapg:/var/lib/postgresql/data
volumes:
  datapg:
