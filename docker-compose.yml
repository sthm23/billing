version: "3.9"

services:
  postgres:
    image: postgres:18-alpine
    container_name: dev_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      # Performance tuning for 4GB VPS
      POSTGRES_SHARED_BUFFERS: 512MB
      POSTGRES_EFFECTIVE_CACHE_SIZE: 1GB
      POSTGRES_MAX_CONNECTIONS: 50
    ports:
      # For production: comment out this line to prevent external access
      - "${POSTGRES_OUTPUT_PORT}:${POSTGRES_PORT}"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backups:/backups
      - ./postgres-init:/docker-entrypoint-initdb.d
    deploy:
      resources:
        limits:
          memory: 2G
          cpus: "1.0"
        reservations:
          memory: 512M
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}" ]
      interval: 10s
      timeout: 5s
      retries: 5
    command: >
      postgres -c shared_buffers=512MB -c effective_cache_size=1GB -c
      max_connections=50 -c work_mem=10MB -c maintenance_work_mem=128MB -c
      random_page_cost=1.1 -c effective_io_concurrency=200 -c wal_buffers=16MB
      -c default_statistics_target=100 -c checkpoint_completion_target=0.9 -c
      max_wal_size=1GB -c min_wal_size=80MB
volumes:
  postgres_data:
